<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product list with cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <div class="header">
        <h1>Desserts</h1>
          <div id="cart-icon-div">
        <img  class="cart-icon"src="assets/images/icon-add-to-cart.svg" alt="Cart icon">
            <span id="item-count">0</span>
        </div>
        </div>
        
        <div id="product-grid">
            <!-- Content added dynamically with JavaScript-->
        </div>
        
        <aside class="cart">
            <div class="cart-header">
            <h2>Your Cart</h2>
            <img class="cart-close" src="assets/images/icon-remove-item.svg" alt="">
            </div>
            
            <div id="cart-items">
            </div>
           
            <p class="delivery"><img src="assets/images/icon-carbon-neutral.svg" alt="icon"> This is a     <span> carbon-neutral </span> delivery</p>
            <button class="order-btn">Confirm Order</button>
            
        </aside>
        
    </section>
  
  <script src="script.js"></script>
</body>
</html>
